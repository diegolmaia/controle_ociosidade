<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <form action="/login" method="post" class="bg-white p-8 rounded shadow-md w-80">
        <h2 class="text-xl font-bold mb-4 text-center">Monitor Login</h2>
        {% if error %}<p class="text-red-500 text-xs mb-4 text-center">Usuário ou senha incorretos</p>{% endif %}
        <input type="text" name="username" placeholder="Usuário" class="w-full border p-2 mb-3 rounded text-sm" required>
        <input type="password" name="password" placeholder="Senha" class="w-full border p-2 mb-4 rounded text-sm" required>
        <button class="w-full bg-indigo-600 text-white p-2 rounded hover:bg-indigo-700 font-bold">Entrar</button>
    </form>
</body>
</html>
